# NeuralBrief Render Blueprint
# Deploy: New > Blueprint > Connect repo > Select this file
# Add OPENAI_API_KEY, SMTP_*, NEWSLETTER_* in Render Dashboard after creation

services:
  - type: cron
    name: neuralbrief-pipeline
    runtime: docker
    dockerfilePath: docker/Dockerfile
    dockerContext: .
    schedule: "0 8 * * *"
    dockerCommand: python main.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neuralbrief-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: NEWSLETTER_FROM_EMAIL
        sync: false
      - key: NEWSLETTER_TO_EMAIL
        sync: false

databases:
  - name: neuralbrief-db
    databaseName: neuralbrief
    plan: free
